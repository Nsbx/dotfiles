# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$sudo\
$nix_shell\
$all\
$directory\
$git_branch\
$git_status\
$fill\
$cmd_duration\
$fill\
$php\
$nodejs\
$ruby\
$rust\
$time\
$line_break\
$character\
"""
command_timeout = 2000
add_newline = true

[sudo]
format = '[ $symbol ]($style)'
symbol = 'пҲӣ'
style = 'bold bg:yellow fg:black'
disabled = false

[fill]
symbol = '-'

[cmd_duration]
format = '[ $duration пү’ ]($style)'
style = 'bg:yellow fg:black'

[os]
disabled = false
format = '[ $symbol ]($style)'
style = 'fg:black bg:white'

[directory]
truncation_length = 3
truncation_symbol = 'вҖҰ/'
format = '[ $path ]($style)[$read_only]($read_only_style)'
style = 'bg:blue'
read_only_style = 'bg:blue'
read_only = 'пҖЈ '

[git_branch]
format = '[ $symbol $branch (:$remote_branch)]($style)'
style = 'fg:black bg:purple'
symbol = 'п„Ұ'

[git_status]
format = '[$ahead_behind]($style)[$all_status]($style)'
style = 'fg:black bg:purple'
ahead = 'вҮЎ${count} '
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count} '
behind = 'вҮЈ${count} '
untracked = '?${count} '
modified = '!${count} '
staged = '+${count} '
renamed = '~${count} '
deleted = '-${count} '

[package]
symbol = 'пЈ– '
disabled = true

[time]
disabled = false
format = '[ $time пҖ— ]($style)'
style = 'fg:black bg:white'

[nix_shell]
disabled = false
symbol = 'пҢ“'
style = 'bold bg:blue fg:white'

[directory.substitutions]
'~' = 'пҹӣ'
'Dev' = 'оһ–'
'Perso' = 'пҖҮ'
'Documents' = 'пңҳ'
'Downloads' = 'пҖҷ'
'Music' = 'пҖҒ'
'Pictures' = 'пҖҫ'

[aws]
symbol = 'оҢҪ  '

[buf]
symbol = 'п’қ '

[c]
symbol = 'оҳһ '

[conda]
symbol = 'п„Ң '

[dart]
symbol = 'оһҳ '

[docker_context]
symbol = 'пҢҲ '

[elixir]
symbol = 'оүө '

[elm]
symbol = 'оҳ¬ '

[golang]
symbol = 'оҳ§ '
format = '[ $symbol ($version) ]($style)'

[guix_shell]
symbol = 'пҢҘ '

[haskell]
symbol = 'оқ· '

[haxe]
symbol = 'вҢҳ '

[hg_branch]
symbol = 'пҗҳ '

[java]
symbol = 'оү– '

[julia]
symbol = 'оҳӨ '

[lua]
symbol = 'оҳ  '

[memory_usage]
symbol = 'пЎҡ '

[meson]
symbol = 'пЁ¶ '

[nim]
symbol = 'пҡӨ '

[nodejs]
symbol = 'оңҳ'
format = '[ $symbol ($version) ]($style)'
style = 'bg:green fg:black bold'
version_format = 'v$major.$minor'

[php]
symbol = 'оҳҲ'
format = '[ $symbol( $version) ]($style)'
style = 'bg:147 fg:black'
version_format = 'v$major.$minor'

[python]
symbol = 'оҲө'

[rlang]
symbol = 'пі’'

[ruby]
symbol = 'оһ‘'
format = '[ $symbol( $version) ]($style)'
style = 'bg:red fg:white bold'
version_format = 'v$major.$minor'

[rust]
symbol = 'оһЁ'
format = '[ $symbol( $version) ]($style)'
style = 'bg:red fg:white bold'
version_format = 'v$major.$minor'

[scala]
symbol = 'оң·'

[spack]
symbol = 'рҹ…ў'

